<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Lector de CSV por modelo</title>

  <!-- PapaParse -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <h1>Lector de CSV</h1>

  <input
    type="file"
    webkitdirectory
    multiple
    accept=".csv"
    id="folderInput"
  />

  <pre id="log"></pre>

  <script src="app.js"></script>
</body>
</html>
